[custom]
; Subconverter remote config template.
; Usage: put this file at a raw-accessible URL, then use that URL as the remote config in your subscription converter.

enable_rule_generator=true
overwrite_original_rules=true

; Keep generated Clash profile clean and compatible with Mihomo/Clash Meta.
clash_rule_base=

; Proxy groups.
custom_proxy_group=рЯЪА Proxy`select`[]вЩїпЄП Auto`.*`[]DIRECT
custom_proxy_group=вЩїпЄП Auto`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=рЯ§Ц AI`select`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*
custom_proxy_group=рЯФН Google`select`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*`[]DIRECT
custom_proxy_group=рЯ™Я Microsoft`select`[]DIRECT`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*
custom_proxy_group=рЯНО Apple`select`[]DIRECT`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*
custom_proxy_group=вЬИпЄП Telegram`select`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*
custom_proxy_group=рЯОђ Emby`select`[]рЯЪА Proxy`[]вЩїпЄП Auto`.*`[]DIRECT
custom_proxy_group=рЯІ≠ Final`select`[]рЯЪА Proxy`[]DIRECT`[]вЩїпЄП Auto`.*

; Local/private networks.
