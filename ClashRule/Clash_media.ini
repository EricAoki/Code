# Clash Meta (Mihomo) 配置模板 - 自建VPS节点版（完整版，包含社交平台分流）
# 适用于单个或多个自建节点，包含简单分流规则 + 防止DNS泄露
# 当前日期参考：2026年1月，东京网络环境友好
# 所有部分完整展开，不使用缩略（如 ... 保持不变）

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
secret: "your_secret_here"  # 强烈建议修改为自己的密码
external-ui: dashboard      # 如果你有本地dashboard文件夹，可保留；否则删除此行

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - tls://8.8.8.8:853
  fallback:
    - https://1.1.1.1/dns-query
    - tls://1.1.1.1:853
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5

proxies:


  # 如果你有更多节点，继续在这里添加类似格式

proxy-groups:
  - name: "🚀 节点选择"
    type: url-test
    proxies:

      # 如果有更多节点，在这里列出
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true

  - name: "🌐 全球直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🤖 AI平台"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "🎮 Steam平台"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "🔍 谷歌服务"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "📺 流媒体平台"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "🪟 微软服务"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

  - name: "📱 社交平台"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

