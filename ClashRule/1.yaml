port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
bind-address: "*"
ipv6: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

geodata-mode: true
geodata-loader: standard

profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53

sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.push.apple.com

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://1.0.0.1/dns-query
    - tls://1.1.1.1:853
    - tls://dns.google:853
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:private,cn":
      - 223.5.5.5
      - 119.29.29.29
    "+.openai.com":
      - https://1.1.1.1/dns-query
    "+.chatgpt.com":
      - https://1.1.1.1/dns-query
    "+.oaistatic.com":
      - https://1.1.1.1/dns-query
    "+.oaiusercontent.com":
      - https://1.1.1.1/dns-query
    "+.anthropic.com":
      - https://1.1.1.1/dns-query
    "+.claude.ai":
      - https://1.1.1.1/dns-query
    "+.perplexity.ai":
      - https://1.1.1.1/dns-query
    "+.poe.com":
      - https://1.1.1.1/dns-query
    "+.gemini.google.com":
      - https://dns.google/dns-query
    "+.generativelanguage.googleapis.com":
      - https://dns.google/dns-query
    "+.googleapis.com":
      - https://dns.google/dns-query
    "+.google.com":
      - https://dns.google/dns-query
    "+.gstatic.com":
      - https://dns.google/dns-query
    "+.googleusercontent.com":
      - https://dns.google/dns-query
    "+.microsoft.com":
      - https://1.1.1.1/dns-query
    "+.msftauth.net":
      - https://1.1.1.1/dns-query
    "+.msauth.net":
      - https://1.1.1.1/dns-query
    "+.live.com":
      - https://1.1.1.1/dns-query
    "+.office.com":
      - https://1.1.1.1/dns-query
    "+.office365.com":
      - https://1.1.1.1/dns-query
    "+.windows.net":
      - https://1.1.1.1/dns-query
    "+.azure.com":
      - https://1.1.1.1/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - "*.msftncsi.com"
    - www.msftconnecttest.com
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

proxies: []

proxy-groups:
  - name: 🚀 Proxy
    type: select
    proxies:
      - DIRECT

  - name: ♻️ Auto
    type: select
    proxies:
      - DIRECT

  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 Proxy
      - ♻️ Auto
      - DIRECT

  - name: 🪟 Microsoft
    type: select
    proxies:
      - DIRECT
      - 🚀 Proxy
      - ♻️ Auto

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 Proxy
      - ♻️ Auto

  - name: 🔍 Google
    type: select
    proxies:
      - 🚀 Proxy
      - ♻️ Auto
      - DIRECT

  - name: ✈️ Telegram
    type: select
    proxies:
      - 🚀 Proxy
      - ♻️ Auto
      - DIRECT

  - name: 🎬 Emby
    type: select
    proxies:
      - 🚀 Proxy
      - ♻️ Auto
      - DIRECT

  - name: 🧭 Final
    type: select
    proxies:
      - 🚀 Proxy
      - DIRECT
      - ♻️ Auto

rule-providers:
  Google:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml
    path: ./ruleset/blackmatrix7/Google.yaml
    interval: 86400
  YouTube:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    path: ./ruleset/blackmatrix7/YouTube.yaml
    interval: 86400
  GoogleFCM:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GoogleFCM/GoogleFCM.yaml
    path: ./ruleset/blackmatrix7/GoogleFCM.yaml
    interval: 86400
  Microsoft:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    path: ./ruleset/blackmatrix7/Microsoft.yaml
    interval: 86400
  GitHub:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    path: ./ruleset/blackmatrix7/GitHub.yaml
    interval: 86400
  Apple:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple_Classical.yaml
    path: ./ruleset/blackmatrix7/Apple_Classical.yaml
    interval: 86400
  Telegram:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    path: ./ruleset/blackmatrix7/Telegram.yaml
    interval: 86400
  Emby:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Emby/Emby.yaml
    path: ./ruleset/blackmatrix7/Emby.yaml
    interval: 86400

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,internal,DIRECT
  - IP-CIDR,0.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve

  - DOMAIN-SUFFIX,openai.com,🤖 AI
  - DOMAIN-SUFFIX,chatgpt.com,🤖 AI
  - DOMAIN-SUFFIX,oaistatic.com,🤖 AI
  - DOMAIN-SUFFIX,oaiusercontent.com,🤖 AI
  - DOMAIN-SUFFIX,auth0.com,🤖 AI
  - DOMAIN-SUFFIX,anthropic.com,🤖 AI
  - DOMAIN-SUFFIX,claude.ai,🤖 AI
  - DOMAIN-SUFFIX,perplexity.ai,🤖 AI
  - DOMAIN-SUFFIX,poe.com,🤖 AI
  - DOMAIN-SUFFIX,cohere.ai,🤖 AI
  - DOMAIN-SUFFIX,midjourney.com,🤖 AI
  - DOMAIN-SUFFIX,replicate.com,🤖 AI
  - DOMAIN-SUFFIX,huggingface.co,🤖 AI
  - DOMAIN-SUFFIX,huggingface.com,🤖 AI
  - DOMAIN-SUFFIX,githubcopilot.com,🤖 AI
  - DOMAIN,copilot.microsoft.com,🤖 AI
  - DOMAIN,gemini.google.com,🤖 AI
  - DOMAIN,bard.google.com,🤖 AI
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,🤖 AI
  - DOMAIN-SUFFIX,ai.google.dev,🤖 AI
  - GEOSITE,openai,🤖 AI
  - GEOSITE,category-ai-!cn,🤖 AI

  - RULE-SET,Google,🔍 Google
  - RULE-SET,YouTube,🔍 Google
  - RULE-SET,GoogleFCM,🔍 Google

  - RULE-SET,Microsoft,🪟 Microsoft
  - RULE-SET,GitHub,🪟 Microsoft

  - RULE-SET,Apple,🍎 Apple

  - RULE-SET,Telegram,✈️ Telegram

  - DOMAIN-SUFFIX,micu.hk,🎬 Emby
  - RULE-SET,Emby,🎬 Emby

  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,🧭 Final
